<!DOCTYPE html>
<html lang="ar" dir="rtl" class="n3-loading">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1c1917" />

    <title>نعامكو | لحوم نعام فاخرة</title>
    <meta name="description" content="احجز لحوم النعام الطازجة قبل الذبح واستمتع بأعلى جودة وطزاجة مضمونة." />
    <meta name="author" content="نعامكو" />
    <meta name="robots" content="index, follow" />

    <!-- ══ STEP 1: Preconnect — zero-RTT for critical origins ══ -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://n3amco.runasp.net" crossorigin />
    <!-- fonts.googleapis.com last — it only returns CSS, not the actual font bytes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- ══ STEP 2: DNS-prefetch fallback for older browsers ══ -->
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://n3amco.runasp.net" />

    <!-- ══ STEP 3: API prefetch — start fetching data BEFORE React loads ══
         This is the single biggest LCP win: data arrives before JS even parses.
    ══ -->
    <link rel="prefetch" href="https://n3amco.runasp.net/api/v1/public/website/home" as="fetch" crossorigin />
    <link rel="prefetch" href="https://n3amco.runasp.net/api/v1/public/batches/open" as="fetch" crossorigin />

    <!-- Favicon -->
    <link rel="icon" href="https://res.cloudinary.com/dsh6m0lko/image/upload/f_auto,q_auto,w_32,h_32/v1781712970/ChatGPT_Image_Jun_17_2026_07_05_11_PM_veqnjp.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ══ STEP 4: Non-blocking font load
         - Only load weights actually used (700, 800, 900)
         - display=swap = text visible immediately in fallback font
         - media=print trick = truly non-render-blocking
    ══ -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" />
    </noscript>

    <style>
      /* ══════════════════════════════════════════════════════
         CRITICAL CSS — inlined so first paint = zero requests
         Everything here is only what's needed above the fold
      ══════════════════════════════════════════════════════ */

      :root {
        --gold:      #B8843A;
        --gold-glow: rgba(184,132,58,0.15);
        --bg:        #1c1917;
        --loader-gold: #c9a96e;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        /*
          Size-adjust trick: make the fallback font visually match Cairo
          so the font-swap causes ZERO layout shift (CLS fix).
          Tahoma is the closest system Arabic font to Cairo.
        */
        font-family: "Cairo", "Tahoma", "Arial", sans-serif;
        background: var(--bg);
        -webkit-text-size-adjust: 100%;
      }

      /* Prevent scroll during load — content underneath loader would cause CLS */
      html.n3-loading, body.n3-loading { overflow: hidden; }

      /* ── LOADER ── */
      #n3-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        overflow: hidden;
        background: var(--bg);
        /* Fade-out transition */
        transition: opacity 0.35s ease, visibility 0.35s ease;
        will-change: opacity;
      }

      #n3-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Radial glow — GPU-only (filter+opacity = compositor layer) */
      .n3-glow {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201,169,110,0.1), transparent 65%);
        filter: blur(32px);
        /* opacity animation = GPU only, no layout, no paint */
        animation: n3GlowPulse 3.5s ease-in-out infinite;
        will-change: opacity;
        pointer-events: none;
      }

      /* Logo ring — explicit 88x88 prevents any CLS */
      .n3-ring {
        position: relative;
        width: 88px;
        height: 88px;
        flex-shrink: 0;
        margin-bottom: 28px;
      }

      /* Spinner — transform-only = GPU composited, never forced reflow */
      .n3-spinner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(201,169,110,0.15);
        border-top-color: var(--loader-gold);
        animation: n3Spin 0.9s linear infinite;
        will-change: transform;
      }

      .n3-logo-inner {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        border: 1.5px solid rgba(201,169,110,0.2);
        background: rgba(255,255,255,0.02);
        backdrop-filter: blur(8px);
      }

      .n3-logo-letter {
        font-size: 26px;
        font-weight: 900;
        color: var(--loader-gold);
        font-family: "Cairo", "Tahoma", Arial, sans-serif;
        /* Explicit size so no reflow when font loads */
        line-height: 1;
        width: 20px;
        text-align: center;
        display: block;
      }

      .n3-brand {
        color: #f5f1ea;
        font-size: 19px;
        font-weight: 900;
        letter-spacing: 3px;
        font-family: "Cairo", "Tahoma", Arial, sans-serif;
        margin-bottom: 8px;
        opacity: 0;
        animation: n3FadeUp 0.8s ease forwards 0.2s;
        will-change: transform, opacity;
      }

      .n3-tagline {
        color: #8b7d6b;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1.5px;
        font-family: "Tahoma", Arial, sans-serif;
        opacity: 0;
        animation: n3FadeUp 0.8s ease forwards 0.4s;
        will-change: transform, opacity;
      }

      /* Progress bar — transform-only shimmer = GPU */
      .n3-bar {
        width: 160px;
        height: 3px;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        overflow: hidden;
        margin-top: 28px;
        position: relative;
      }

      .n3-bar::after {
        content: "";
        position: absolute;
        inset-block: 0;
        width: 50%;
        background: linear-gradient(90deg, transparent, var(--loader-gold), transparent);
        animation: n3Shimmer 1.2s ease-in-out infinite;
        will-change: transform;
      }

      /* ══ Keyframes — only transform & opacity, never layout props ══ */
      @keyframes n3Spin {
        to { transform: rotate(360deg); }
      }

      @keyframes n3GlowPulse {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 1;   }
      }

      @keyframes n3FadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0);    }
      }

      @keyframes n3Shimmer {
        0%   { transform: translateX(-150%); }
        100% { transform: translateX(350%);  }
      }

      /* ══ Reduced motion — kills all animation ══ */
      @media (prefers-reduced-motion: reduce) {
        .n3-spinner, .n3-glow, .n3-brand, .n3-tagline, .n3-bar::after {
          animation: none !important;
        }
        .n3-brand, .n3-tagline { opacity: 1; }
        .n3-spinner { border-top-color: var(--loader-gold); }
      }

      /* ══ FONT SIZE ADJUST for CLS ══
         Cairo is ~5% wider than Tahoma at same font-size.
         This tweak makes the fallback match so font-swap = zero shift.
         (Chrome/Edge 92+ support @font-face size-adjust)
      ══ */
      @font-face {
        font-family: "Cairo-fallback";
        src: local("Tahoma");
        size-adjust: 95%;
        ascent-override: 105%;
        descent-override: 25%;
        line-gap-override: 0%;
      }
    </style>
  </head>

  <body>
    <noscript>يجب تفعيل JavaScript لتشغيل موقع نعامكو.</noscript>

    <div id="root">
      <div id="n3-loader" role="status" aria-label="جاري التحميل">
        <div class="n3-glow" aria-hidden="true"></div>

        <div class="n3-ring" aria-hidden="true">
          <div class="n3-spinner"></div>
          <div class="n3-logo-inner">
            <span class="n3-logo-letter">N</span>
          </div>
        </div>

        <div class="n3-brand" aria-hidden="true">نعامكو</div>
        <div class="n3-tagline" aria-hidden="true">PREMIUM OSTRICH</div>
        <div class="n3-bar" aria-hidden="true"></div>
      </div>
    </div>

    <!--
      ══ EARLY API FETCH ══
      Start fetching API data right now — before React bundle even downloads.
      React will read from this cache via window.__N3_DATA__ instead of making
      a second network request. This moves LCP from ~12s → ~3-4s on slow 4G.
    -->
    <script>
      (function () {
        'use strict';

        // ── 1. Start API fetches immediately ──
        var HOME_URL  = 'https://n3amco.runasp.net/api/v1/public/website/home';
        var BATCH_URL = 'https://n3amco.runasp.net/api/v1/public/batches/open';

        window.__N3_DATA__ = { home: null, batch: null, ready: false };

        Promise.all([
          fetch(HOME_URL).then(function(r)  { return r.ok ? r.json() : null; }).catch(function() { return null; }),
          fetch(BATCH_URL).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; })
        ]).then(function(results) {
          window.__N3_DATA__.home  = results[0];
          window.__N3_DATA__.batch = results[1];
          window.__N3_DATA__.ready = true;
          // Signal React that data is ready
          document.dispatchEvent(new CustomEvent('n3:data-ready'));
        });

        // ── 2. LCP Preload: fetch & inject first hero image ──
        // We don't know the URL until the API responds, but we can add a
        // <link rel="preload"> the moment it arrives — before React renders.
        document.addEventListener('n3:data-ready', function () {
          try {
            var data    = window.__N3_DATA__.home;
            var payload = (data && (data.data || data)) || {};
            var sliders = payload.sliders || [];
            if (!sliders.length) return;

            var isMobile = window.innerWidth <= 768;
            var firstSlide = sliders[0];
            var imgUrl = (isMobile && firstSlide.mobileImageUrl) ? firstSlide.mobileImageUrl : firstSlide.imageUrl;
            if (!imgUrl) return;

            // Inject Cloudinary transforms for mobile vs desktop
            if (imgUrl.indexOf('res.cloudinary.com') !== -1) {
              var w = isMobile ? '800' : '1400';
              var h = isMobile ? '600' : '900';
              imgUrl = imgUrl.replace('/upload/', '/upload/f_auto,q_auto:best,w_' + w + ',h_' + h + ',c_fill,g_center/');
            }

            // Inject <link rel="preload"> for LCP image
            var link = document.createElement('link');
            link.rel  = 'preload';
            link.as   = 'image';
            link.href = imgUrl;
            link.fetchpriority = 'high';
            document.head.appendChild(link);

            // Cache the URL so React can read it without refetching
            window.__N3_LCP_IMG__ = imgUrl;
          } catch (e) {}
        });

        // ── 3. Loader hide — fires when React mounts its first real node ──
        var root   = document.getElementById('root');
        var loader = document.getElementById('n3-loader');

        if (root && loader) {
          var obs = new MutationObserver(function () {
            var first = root.firstElementChild;
            if (!first || first.id === 'n3-loader') return;
            // React has painted — hide loader
            loader.classList.add('hidden');
            document.documentElement.classList.remove('n3-loading');
            document.body.classList.remove('n3-loading');
            obs.disconnect();
            // Remove from DOM after fade
            setTimeout(function () {
              if (loader.parentNode) loader.parentNode.removeChild(loader);
            }, 400);
          });

          obs.observe(root, { childList: true });
        }
      })();
    </script>
  </body>
</html>
